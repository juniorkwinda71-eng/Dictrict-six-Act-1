<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Mom</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    overflow-x:hidden;
    font-family:Arial, sans-serif;
    background:black;
}

/* COVER PAGE */

#cover-page{
    width:100%;
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url("images/cover-bg.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    position:relative;

    transition:opacity 1.5s ease;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
}

.cover-content{
    z-index:2;
    padding:20px;
}

/* REALISTIC GOLD TITLE */

#title{

    font-size:clamp(50px, 10vw, 110px);

    font-weight:900;

    line-height:1.1;

    letter-spacing:2px;

    font-family:Georgia, serif;

    background:
    linear-gradient(
    180deg,
    #fff8dc 0%,
    #ffe27a 15%,
    #d4a017 35%,
    #fff4b0 50%,
    #c99700 65%,
    #fff0a0 85%,
    #fff8dc 100%
    );

    background-size:200% 200%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 1px 0 #fff6b0,
    0 2px 2px rgba(0,0,0,0.35),
    0 4px 6px rgba(0,0,0,0.45),
    0 0 12px rgba(255,215,0,0.45);

    filter:drop-shadow(0 0 8px rgba(255,215,0,0.25));
}

#subtitle{

    margin-top:20px;

    color:white;

    font-size:clamp(20px, 4vw, 35px);

    letter-spacing:1px;
}

/* PAGE 2 */

#message-page{

    width:100%;
    min-height:100vh;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px 15px;

    overflow:hidden;
}

/* SLIDESHOW */

#background-slider{

    position:absolute;

    width:100%;
    height:100%;

    top:0;
    left:0;

    background-size:cover;
    background-position:center;

    transition:background-image 1.5s ease-in-out;
}

/* DARK LAYER */

.dark-layer{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.55);

    z-index:1;
}

/* MESSAGE */

.message-box{

    position:relative;

    z-index:2;

    width:100%;
    max-width:950px;

    background:rgba(0,0,0,0.35);

    padding:30px 22px;

    border-radius:25px;

    backdrop-filter:blur(6px);
}

#message{

    color:white;

    font-size:clamp(21px, 4vw, 31px);

    line-height:1.8;

    white-space:pre-line;
}
    </style>

</head>

<body>

<!-- COVER PAGE -->

<section id="cover-page">

    <div class="overlay"></div>

    <div class="cover-content">

        <h1 id="title"></h1>

        <p id="subtitle"></p>

    </div>

</section>



<!-- MESSAGE PAGE -->

<section id="message-page">

    <div id="background-slider"></div>

    <div class="dark-layer"></div>

    <div class="message-box">

        <p id="message"></p>

    </div>

</section>



<!-- MUSIC -->

<audio id="bg-music" loop>

    <source src="Music/song.mp3" type="audio/mp3">

</audio>


<script>
const titleText = "Happy Birthday Mom ❤️";

const subtitleText = "By your son Junior ❤️";

const messageText = `Happy Birthday Mom 🎉❤️🌹

Today is not just the celebration of your birth, but the celebration of the strongest woman I know 💪❤️ You carried pain with strength, faced struggles with courage, and still managed to give love with the purest heart 🤍 Everything good in me comes from you. Your sacrifices, your prayers 🙏, your sleepless nights, and your endless support built the person I am becoming today 🌟

No words can truly explain how much you mean to me 🥺❤️ You are my protector 🛡️, my teacher 📚, my safe place 🏡, and my biggest blessing ✨ Even when life becomes hard, your love gives me strength to keep going 💯 I thank God every day for giving me a mother like you 🙏❤️

I promise to make you proud one day 🌍🏆 and give you the life you deserve after everything you have done for me 💐 You deserve happiness 😊, peace 🕊️, love ❤️, and every beautiful thing this world can offer 🌸✨

May this birthday bring you joy 🎂, long life 🌹, good health 💖, and endless blessings 🙏✨ I love you more than words can ever explain ❤️

From your son, Junior ❤️`;



/* IMAGES */

const images = [

    "images/mom1.png",
    "images/mom2.png",
    "images/mom3.png",
    "images/mom4.png",
    "images/mom5.png",
    "images/mom6.png"

];



/* VARIABLES */

let current = 0;

let paused = false;

const music = document.getElementById("bg-music");



/* TYPING EFFECT */

function typeText(elementId, text, speed){

    let i = 0;

    function typing(){

        if(i < text.length){

            document.getElementById(elementId).innerHTML +=
            text.charAt(i);

            i++;

            setTimeout(typing, speed);
        }
    }

    typing();
}



/* START WEBSITE */

window.onload = () => {

    /* MUSIC */

    music.volume = 0.4;

    document.body.addEventListener("click", () => {

        music.play();

    }, { once:true });



    /* TITLE */

    typeText("title", titleText, 90);



    /* SUBTITLE */

    setTimeout(() => {

        typeText("subtitle", subtitleText, 60);

    }, 2000);



    /* REMOVE COVER PAGE */

    setTimeout(() => {

        document.getElementById("cover-page")
        .style.opacity = "0";



        setTimeout(() => {

            document.getElementById("cover-page")
            .style.display = "none";



            /* START MESSAGE */

            typeText("message", messageText, 18);

        }, 1500);

    }, 5000);



    /* START SLIDESHOW */

    startSlideshow();
};



/* PHOTO SLIDESHOW */

function startSlideshow(){

    const slider =
    document.getElementById("background-slider");



    slider.style.backgroundImage =
    `url('${images[current]}')`;



    setInterval(() => {

        if(!paused){

            current++;



            if(current >= images.length){

                current = 0;
            }



            slider.style.backgroundImage =
            `url('${images[current]}')`;
        }

    }, 6000);
}



/* HOLD SCREEN TO PAUSE */

document.addEventListener("touchstart", () => {

    paused = true;

});



document.addEventListener("touchend", () => {

    paused = false;

});
</script>

</body>
</html>

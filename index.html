<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Mom</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>



<!-- MUSIC BUTTON -->

<button id="music-btn">

    🎵 Tap To Start Experience

</button>



<!-- COVER PAGE -->

<section id="cover-page">

    <div class="overlay"></div>

    <div class="cover-content">

        <h1 id="title"></h1>

        <p id="subtitle"></p>

    </div>

</section>



<!-- PAGE 2 -->

<section id="message-page">

    <div id="background-slider"></div>

    <div class="dark-layer"></div>

    <div class="message-box">

        <p id="message"></p>

    </div>



    <!-- SCROLL INDICATOR -->

    <div id="scroll-indicator">

        ↓ Scroll Down ↓

    </div>

</section>



<!-- MUSIC -->

<audio id="bg-music" loop>

    <source src="music/song.mp3" type="audio/mp3">

</audio>



<script src="script.js"></script>

</body>
</html>
